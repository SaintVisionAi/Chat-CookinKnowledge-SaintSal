<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Debug Tool</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        .container {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 {
            color: #4CAF50;
            margin-top: 0;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            background: #333;
            border-radius: 5px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #4CAF50;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 5px;
            color: #e0e0e0;
            font-size: 14px;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background: #45a049;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        #output {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 5px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #4CAF50;
            padding-left: 10px;
        }
        .log-error {
            border-left-color: #f44336;
            color: #ffcdd2;
        }
        .log-success {
            border-left-color: #4CAF50;
            color: #c8e6c9;
        }
        .log-info {
            border-left-color: #2196F3;
            color: #bbdefb;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-weight: bold;
        }
        .status-connected {
            background: #1b5e20;
            color: #c8e6c9;
        }
        .status-disconnected {
            background: #b71c1c;
            color: #ffcdd2;
        }
        .status-connecting {
            background: #f57c00;
            color: #fff3e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Chat Debug Tool</h1>
        <p>Test WebSocket chat functionality without the full UI</p>

        <div class="section">
            <div id="connectionStatus" class="status status-disconnected">
                ⚫ Not Connected
            </div>
        </div>

        <div class="section">
            <label>Conversation ID (leave empty for new conversation):</label>
            <input type="text" id="conversationId" placeholder="Auto-generated if empty">

            <label>Model:</label>
            <select id="model">
                <option value="claude-sonnet-4-5">Claude Sonnet 4.5</option>
                <option value="gpt-5">GPT-5</option>
            </select>

            <label>Mode:</label>
            <select id="mode">
                <option value="chat">Chat</option>
                <option value="search">Search</option>
                <option value="research">Research</option>
                <option value="code">Code</option>
                <option value="voice">Voice</option>
            </select>

            <label>Your Message:</label>
            <textarea id="message" rows="4" placeholder="Enter your message here...">Hello! Can you tell me a short joke?</textarea>

            <button onclick="testChat()" id="sendBtn">🚀 Send Test Message</button>
            <button onclick="clearOutput()">🗑️ Clear Output</button>
        </div>

        <div class="section">
            <label>Output Log:</label>
            <div id="output"></div>
        </div>
    </div>

    <script>
        let ws = null;
        let currentConversationId = null;

        function log(message, type = 'info') {
            const output = document.getElementById('output');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            output.appendChild(entry);
            output.scrollTop = output.scrollHeight;
        }

        function updateStatus(status, text) {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.className = `status status-${status}`;
            statusEl.textContent = text;
        }

        function clearOutput() {
            document.getElementById('output').innerHTML = '';
            log('Output cleared', 'info');
        }

        function testChat() {
            const message = document.getElementById('message').value;
            const model = document.getElementById('model').value;
            const mode = document.getElementById('mode').value;
            let conversationId = document.getElementById('conversationId').value || currentConversationId;

            if (!message.trim()) {
                log('❌ Please enter a message', 'error');
                return;
            }

            log('🔌 Connecting to WebSocket...', 'info');
            updateStatus('connecting', '🟡 Connecting...');

            // Close existing connection
            if (ws) {
                ws.close();
            }

            // Create WebSocket connection
            const wsUrl = `ws://${window.location.hostname}:5000/ws`;
            log(`WebSocket URL: ${wsUrl}`, 'info');
            
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                log('✅ WebSocket connected!', 'success');
                updateStatus('connected', '🟢 Connected');

                const payload = {
                    type: 'chat',
                    conversationId: conversationId || null,
                    message: message,
                    model: model,
                    mode: mode
                };

                log('📤 Sending payload:', 'info');
                log(JSON.stringify(payload, null, 2), 'info');

                ws.send(JSON.stringify(payload));
                document.getElementById('sendBtn').disabled = true;
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    log(`📥 Received: ${data.type}`, 'info');

                    if (data.type === 'chunk') {
                        log(`💬 ${data.content}`, 'success');
                    } else if (data.type === 'done') {
                        log('✅ Message completed!', 'success');
                        document.getElementById('sendBtn').disabled = false;
                        ws.close();
                    } else if (data.type === 'error') {
                        log(`❌ Error: ${data.message}`, 'error');
                        document.getElementById('sendBtn').disabled = false;
                        ws.close();
                    } else if (data.type === 'conversationCreated') {
                        currentConversationId = data.conversationId;
                        document.getElementById('conversationId').value = data.conversationId;
                        log(`✅ New conversation created: ${data.conversationId}`, 'success');
                    } else if (data.type === 'status') {
                        log(`ℹ️ Status: ${data.message}`, 'info');
                    } else {
                        log(`📦 ${JSON.stringify(data)}`, 'info');
                    }
                } catch (error) {
                    log(`❌ Failed to parse message: ${error.message}`, 'error');
                }
            };

            ws.onerror = (error) => {
                log(`❌ WebSocket error: ${error}`, 'error');
                updateStatus('disconnected', '⚫ Error');
                document.getElementById('sendBtn').disabled = false;
            };

            ws.onclose = () => {
                log('🔌 WebSocket closed', 'info');
                updateStatus('disconnected', '⚫ Disconnected');
                document.getElementById('sendBtn').disabled = false;
            };
        }

        // Initial log
        log('🎯 Chat Debug Tool loaded. Click "Send Test Message" to begin.', 'success');
        log('ℹ️ Make sure you are logged in at http://localhost:5000/login first!', 'info');
    </script>
</body>
</html>
