# Render.com deployment configuration
# Deploy backend with full WebSocket support

services:
  - type: web
    name: saintsal-backend
    env: node
    buildCommand: npm install && npm run build && node scripts/build-vercel.js
    startCommand: node api/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Add your environment variables in Render dashboard:
      # DATABASE_URL, SESSION_SECRET, ANTHROPIC_API_KEY, etc.
    healthCheckPath: /api/health

